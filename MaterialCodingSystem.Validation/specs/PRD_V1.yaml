spec_version: v1

meta:
  system: material-code-system
  description: material coding system validation spec (V1.3 rule freeze aligned to PRD + meta.prd_freeze)
  invariant: true
  testing_scope_note: |
    约束：当前阶段仅做「规则冻结」与轻量契约对齐，不新增复杂测试逻辑。
    不新增：
      - 并发测试（除既有用例）
      - “重试耗尽”真实触发测试
      - 复杂 SQL 验证/排序全量校验
    上述测试延迟到 Phase 2 实现阶段补齐。
  case_tags_note: |
    说明：当前 Validation runner 的 YAML case 模型不支持为每个用例扩展顶层字段（例如 `tags:`），
    为保证 YAML 可被现有解析器稳定解析，本项目采用 `meta.case_tags` 做“用例ID → tags数组”的映射标注。
    约定：
      - contract_only：仅验证契约，不依赖真实实现
      - echo：当前通过 `when.action=echo` 的输入回声验证
  case_tags:
    SUFFIX_RETRY_002: [contract_only, echo]
    STATUS_DISPLAY_001: [contract_only, echo]
    EXPORT_ORDER_001: [contract_only, echo]
    CATEGORY_NOT_FOUND_001: [contract_only, echo]
    DB_EXPORT_001: [contract_only, echo]
    DB_AUTOBACKUP_001: [contract_only, echo]
    DB_RESTORE_001: [contract_only, echo]
    DB_RESTORE_002: [contract_only, echo]
    DB_RESTORE_003: [contract_only, echo]
  prd_freeze:
    version: "2026-04-13"
    identifier_policy:
      category:
        domain_key: category_code
        storage_key: category_id
        rule: "ALL DB operations MUST use category_id"
        exception: "only parsing / UI display may use category_code"
    start_serial_no_policy:
      type: warning_only
      override_allowed: true
      affects_generation: false
      affects_validation: false
    suffix_semantics:
      A: anchor_item
      B-Z: replacement_items
    group_resolution:
      input: category_id + serial_no
      output: group_id
      uniqueness: true
    name_policy:
      source: category.name
      persistence: snapshot
      user_editable: false
      mutation: immutable_after_creation
      transaction:
        read_category_name_same_transaction_as_insert: true
        same_connection: true
        snapshot_basis: transaction_start_moment
      description: |
        物料名称不由用户输入；
        创建时在与插入同一事务、同一连接内读取 category.name 并写入 material_item.name 快照；
        后续分类改名不级联更新已有物料 name。
    replacement_creation:
      mode: by_group_id
      input: group_id
      behavior:
        - 系统以 group_id 为唯一事实锚点完成替代料创建编排（现有实现入口）
        - Presentation 层禁止暴露“通过 code 解析 group”的入口（当前系统无该入参/DTO/字段）
      constraint:
        - 基准物料必须 status = 1（正常）
      error:
        deprecated_anchor: ANCHOR_ITEM_DEPRECATED
      group_lifecycle_semantics:
        suffix_A:
          rule: "suffix == 'A' 可创建 group（主料路径）"
        suffix_not_A:
          rule: "suffix != 'A' 必须依赖已存在 group，禁止创建 group（替代料路径）"
      transaction:
        single_transaction: true
        steps:
          - group_load
          - suffix_allocate
          - item_insert
        concurrency: suffix_unique_via_db_constraint_and_retry
    suffix_policy:
      strategy: A-Z
      uniqueness: "(group_id, suffix)"
      uniqueness_scope_note: "唯一性约束包含已废弃数据（status=0）；废弃不释放 suffix 槽位。"
      allocation:
        retry:
          max_attempts: 3
          on_conflict: retry
        failure_error: SUFFIX_ALLOCATION_FAILED
      overflow_error: SUFFIX_OVERFLOW
      continuity:
        required: false
        note: |
          suffix 不要求连续；删除导致 gap 合法；
          gap 不阻止新增；仅保留 UNIQUE(group_id, suffix)。
    status:
      active: 1
      deprecated: 0
      display:
        1: 正常
        0: 已废弃
      source_of_truth: domain
      unified_surfaces:
        - ui
        - search
        - export
    export:
      sheet1:
        name: 全量
        scope: all_items
        include_deprecated: true
        order_by:
          - category_code
          - serial_no
          - suffix
      category_sheets:
        scope: active_only
        include_deprecated: false
        order_by:
          - category_code
          - serial_no
          - suffix
      sort_note: 禁止仅按完整 code 字符串排序；必须以结构化键排序（与 material_group.serial_no + material_item.suffix 一致）。
    terminology:
      material_item_name: "历史名称（快照）"
      display_name: "当前分类名称（category.name），用于 UI/导出"
    uniqueness:
      code: "UNIQUE(code) 含 status=0（废弃不释放）"
      group_suffix: "UNIQUE(group_id, suffix) 含 status=0（废弃不释放）"
      category_spec: "spec 唯一性仅约束 status=1；status=0 释放 spec 占用（允许同分类复用 spec）"
    base_code_definition:
      equals: material_group.serial_no
      description: |
        base_code 不单独存储；
        排序与导出顺序中的逻辑「base」等价于 material_group.serial_no（与 category_code 组合定位组）。
    deprecation:
      cascade: false
      behavior:
        - 仅将当前物料标记为 deprecated（status=0）
        - 不级联废弃同组其他替代料
      constraint:
        - 已废弃物料不得作为新增替代料的基准物料
    error_codes:
      SUFFIX_ALLOCATION_FAILED: 后缀分配失败（并发重试耗尽，区别于 A-Z 用尽）
      SUFFIX_OVERFLOW: 后缀耗尽（A-Z 已用完）
      CODE_CONFLICT_RETRY: 编码冲突（全局 code 唯一等，事务级重试仍失败）
      ANCHOR_ITEM_DEPRECATED: 基准物料已废弃，禁止以此创建替代料
    ui_state_machines:
      replacement_page:
        anchor_load:
          states:
            - 未选择
            - 加载中
            - 成功
            - 失败
        submit:
          states_note: 提交态独立（如提交中/成功/失败），禁止与基准加载四态混用同一枚举


cases:

# =====================================================
# 1. 主物料创建成功
# =====================================================
  - id: CREATE_A_SUCCESS_001
    title: 创建主物料成功（首个）
    type: core

    given:
      db:
        category:
          - code: ZDA
            name: 电阻

      input:
        category_code: ZDA
        spec: CL10A106KP8NNNC
        description: 10uF 16V 0603 X5R
        name: test
        brand: YAGEO

    when:
      action: create_material_A

    then:
      output:
        code: ZDA0000001A

      db:
        material_group:
          exists:
            category_code: ZDA
            serial_no: 1

        material_item:
          exists:
            code: ZDA0000001A
            spec: CL10A106KP8NNNC
            spec_normalized: 10UF 16V 0603 X5R
            status: 1

    replay: true
    deterministic: true


# =====================================================
# 2. spec唯一性（核心规则）
# =====================================================
  - id: SPEC_DUPLICATE_001
    title: 同分类 spec 重复必须阻止
    type: core

    given:
      db:
        category:
          - code: ZDA

        material_item:
          - category_code: ZDA
            spec: CL10A106KP8NNNC
            status: 1

      input:
        category_code: ZDA
        spec: CL10A106KP8NNNC
        description: 10uF 16V 0603

    when:
      action: create_material_A

    then:
      error:
        code: SPEC_DUPLICATE

    replay: true
    deterministic: true


# =====================================================
# 3. spec_normalized规则（严格收敛）
# =====================================================
  - id: SPEC_NORMALIZE_001
    title: description → spec_normalized 规则
    type: invariant

    given:
      input:
        description: " 10uF   16V   0603  "

    when:
      action: normalize_spec

    then:
      output:
        spec_normalized: "10UF 16V 0603"

    replay: true
    deterministic: true


# =====================================================
# 4. spec_normalized不参与唯一性
# =====================================================
  - id: SPEC_NORMALIZED_IGNORE_DUP_001
    title: spec_normalized相同不阻止创建
    type: core

    given:
      db:
        material_item:
          - category_code: ZDA
            spec: AAAAA11111
            description: 10uF 16V 0603
            spec_normalized: 10UF 16V 0603

      input:
        category_code: ZDA
        spec: BBBBB22222
        description: 10uF 16V 0603

    when:
      action: create_material_A

    then:
      output:
        code: ZDA0000002A

      db:
        material_item:
          exists:
            spec: BBBBB22222

    replay: true
    deterministic: true


# =====================================================
# 5. 替代料生成（A-Z）
# =====================================================
  - id: CREATE_REPLACEMENT_001
    title: 替代料顺序生成
    type: core

    given:
      db:
        material_group:
          - id: 1
            category_code: ZDA
            serial_no: 1

        material_item:
          - group_id: 1
            suffix: A
          - group_id: 1
            suffix: B

      input:
        group_id: 1
        spec: CL10A106KP8NNND
        description: 10uF 16V 0603 X5R
        brand: TEST_BRAND

    when:
      action: create_material_replacement

    then:
      output:
        code: ZDA0000001C

      db:
        material_item:
          exists:
            suffix: C

    replay: true
    deterministic: true


# =====================================================
# 6. suffix gap 合法（不要求连续；允许补位）
# =====================================================
  - id: SUFFIX_GAP_ALLOWED_001
    title: suffix 不连续为合法状态（A/C 存在仍允许创建 B）
    type: core

    given:
      db:
        material_item:
          - group_id: 1
            suffix: A
          - group_id: 1
            suffix: C

      input:
        group_id: 1
        spec: xxx
        description: d
        brand: TEST_BRAND

    when:
      action: create_material_replacement

    then:
      output:
        code: ZDA0000001B

      db:
        material_item:
          exists:
            suffix: B

    replay: true
    deterministic: true


# =====================================================
# 7. suffix上限Z
# =====================================================
  - id: SUFFIX_OVERFLOW_001
    title: 超过Z禁止创建（同组已连续 A–Z 时下一后缀溢出）
    type: edge

    given:
      db:
        material_group:
          - id: 1
            category_code: ZDA
            serial_no: 1
        material_item:
          - { group_id: 1, suffix: A }
          - { group_id: 1, suffix: B }
          - { group_id: 1, suffix: C }
          - { group_id: 1, suffix: D }
          - { group_id: 1, suffix: E }
          - { group_id: 1, suffix: F }
          - { group_id: 1, suffix: G }
          - { group_id: 1, suffix: H }
          - { group_id: 1, suffix: I }
          - { group_id: 1, suffix: J }
          - { group_id: 1, suffix: K }
          - { group_id: 1, suffix: L }
          - { group_id: 1, suffix: M }
          - { group_id: 1, suffix: N }
          - { group_id: 1, suffix: O }
          - { group_id: 1, suffix: P }
          - { group_id: 1, suffix: Q }
          - { group_id: 1, suffix: R }
          - { group_id: 1, suffix: S }
          - { group_id: 1, suffix: T }
          - { group_id: 1, suffix: U }
          - { group_id: 1, suffix: V }
          - { group_id: 1, suffix: W }
          - { group_id: 1, suffix: X }
          - { group_id: 1, suffix: Y }
          - { group_id: 1, suffix: Z }

      input:
        group_id: 1
        spec: xxx
        brand: TEST_BRAND

    when:
      action: create_material_replacement

    then:
      error:
        code: SUFFIX_OVERFLOW

    replay: true
    deterministic: true


# =====================================================
# 8. 废弃仍占唯一性（PRD关键约束）
# =====================================================
  - id: STATUS_NO_DELETE_001
    title: 废弃数据仍占spec唯一性
    type: invariant

    given:
      db:
        material_item:
          - category_code: ZDA
            spec: CL10A106KP8NNNC
            status: 0

      input:
        category_code: ZDA
        spec: CL10A106KP8NNNC
        description: 10uF

    when:
      action: create_material_A

    then:
      error:
        code: SPEC_DUPLICATE

    replay: true
    deterministic: true


# =====================================================
# 9. 并发创建（结果唯一）
# =====================================================
  - id: CONCURRENT_CREATE_A_001
    title: 并发创建主物料不重复
    type: edge

    given:
      input:
        category_code: ZDA
        spec_prefix: TEST_
        count: 5

    when:
      action: create_material_A_batch

    then:
      output:
        no_duplicate: true

      db:
        material_item:
          unique: code

    replay: true
    deterministic: false

# =====================================================
# 10. category validation（分类合法性）
# =====================================================
  - id: CATEGORY_VALIDATE_001
    title: 不存在的分类必须拒绝
    type: core

    given:
      db:
        category:
          - code: ZDA

      input:
        category_code: INVALID
        spec: ABC123
        description: test

    when:
      action: create_material_A

    then:
      error:
        code: CATEGORY_NOT_FOUND

    replay: true
    deterministic: true


  - id: CATEGORY_VALIDATE_002
    title: 分类为空必须拒绝
    type: core

    given:
      input:
        category_code: ""
        spec: ABC123
        description: test

    when:
      action: create_material_A

    then:
      error:
        code: CATEGORY_REQUIRED

    replay: true
    deterministic: true


# =====================================================
# 11. lifecycle（group / status 生命周期）
# =====================================================
  - id: LIFECYCLE_GROUP_FREEZE_001
    title: group 创建后不可变更 category_code
    type: invariant

    given:
      db:
        material_group:
          - id: 1
            category_code: ZDA
            serial_no: 1

      input:
        group_id: 1
        category_code: ZDB   # 尝试篡改
        spec: XXX

    when:
      action: update_group

    then:
      error:
        code: GROUP_CATEGORY_LOCKED

    replay: true
    deterministic: true


  - id: LIFECYCLE_STATUS_TRANSITION_001
    title: status非法流转禁止
    type: invariant

    given:
      db:
        material_item:
          - code: ZDA0000001A
            status: 1   # active

      input:
        code: ZDA0000001A
        status: 2      # 非法状态

    when:
      action: update_status

    then:
      error:
        code: INVALID_STATUS_TRANSITION

    replay: true
    deterministic: true


# =====================================================
# 12. normalization edge cases（规范化边界）
# =====================================================
  - id: NORMALIZE_EDGE_001
    title: description包含特殊字符（仅基础规范化）
    type: edge

    given:
      input:
        description: " 10uF@16V   (0603)   X5R "

    when:
      action: normalize_spec

    then:
      output:
        spec_normalized: "10UF@16V (0603) X5R"

    replay: true
    deterministic: true


  - id: NORMALIZE_EDGE_002
    title: 中英混合文本（不做语义提取）
    type: edge

    given:
      input:
        description: "电容 capacitor 10uF 16V"

    when:
      action: normalize_spec

    then:
      output:
        spec_normalized: "电容 CAPACITOR 10UF 16V"

    replay: true
    deterministic: true


  - id: NORMALIZE_EDGE_003
    title: 空描述处理
    type: edge

    given:
      input:
        description: ""

    when:
      action: normalize_spec

    then:
      output:
        spec_normalized: ""

    replay: true
    deterministic: true


# =====================================================
# 13. concurrency semantics（并发语义强化）
# =====================================================
  - id: CONCURRENT_SPEC_UNIQUE_001
    title: 并发创建同spec必须唯一
    type: invariant

    given:
      input:
        category_code: ZDA
        spec: SAME_SPEC
        concurrent: 10

    when:
      action: create_material_A_concurrent

    then:
      output:
        success_count: 1
        duplicate_rejected: 9

      db:
        material_item:
          unique_constraint: "category_code+spec"

    replay: true
    deterministic: false


# =====================================================
# 14. suffix policy（gap 不影响新增；允许补位）
# =====================================================
  - id: SUFFIX_POLICY_GAP_001
    title: 删除中间 suffix 造成 gap 为合法；仍允许新增并可补位
    type: invariant

    given:
      db:
        material_item:
          - group_id: 1
            suffix: A
          - group_id: 1
            suffix: C

      input:
        group_id: 1
        spec: xxx
        description: d
        brand: TEST_BRAND

    when:
      action: create_material_replacement

    then:
      output:
        code: ZDA0000001B

    replay: true
    deterministic: true


# =====================================================
# 15. code generation rules（编码生成规则补全）
# =====================================================
  - id: CODE_GEN_GROUP_SEQ_001
    title: group内序号必须连续递增
    type: invariant

    given:
      db:
        material_group:
          - category_code: ZDA
            serial_no: 1

      input:
        category_code: ZDA

    when:
      action: allocate_group_serial

    then:
      output:
        serial_no: 2

    replay: true
    deterministic: true


  - id: CODE_GEN_MATERIAL_FORMAT_001
    title: material code 格式必须符合规范
    type: invariant

    given:
      input:
        category_code: ZDA
        serial_no: 12
        suffix: A

    when:
      action: generate_material_code

    then:
      output:
        code: "ZDA0000012A"

    replay: true
    deterministic: true


  - id: CODE_GEN_PADDING_RULE_001
    title: serial_no 必须左补零6位
    type: invariant

    given:
      input:
        serial_no: 1

    when:
      action: format_serial

    then:
      output:
        formatted: "000001"

    replay: true
    deterministic: true


# =====================================================
# 16. group 自动创建（核心生命周期补全）
# =====================================================
  - id: GROUP_AUTO_CREATE_001
    title: 创建物料自动生成group
    type: core

    given:
      db:
        material_group: []

      input:
        category_code: ZDA
        spec: CL10A106KP8NNNC
        description: 10uF

    when:
      action: create_material_A

    then:
      db:
        material_group:
          exists:
            category_code: ZDA
            serial_no: 1

    replay: true
    deterministic: true


# =====================================================
# 17. V1.3 规则冻结 — Name 快照
# =====================================================
  - id: NAME_SNAPSHOT_001
    title: 创建物料时 item.name 与 category.name 快照一致（见 meta.prd_freeze.name_policy）
    type: contract_core

    given:
      db:
        category:
          - code: CAP
            name: Capacitor

      input:
        category_code: CAP
        spec: NAME_SNAPSHOT_SPEC_001
        description: 10uF

    when:
      action: create_material_A

    then:
      db:
        material_item:
          exists:
            name: Capacitor

    replay: true
    deterministic: true


  - id: NAME_SNAPSHOT_002
    title: 分类改名后历史物料 name 不变（种子持仓 + 规范化动作不改变 item.name）
    type: contract_core

    given:
      db:
        category:
          - code: CAP
            name: Cap
        material_group:
          - id: 1
            category_code: CAP
            serial_no: 1
        material_item:
          - group_id: 1
            suffix: A
            name: Capacitor
            code: CAP0000001A
            description: d
            spec: NAME_SNAPSHOT_SPEC_SEED
            spec_normalized: D

      input:
        description: " 10uF   16V   0603  "

    when:
      action: normalize_spec

    then:
      output:
        spec_normalized: "10UF 16V 0603"

      db:
        category:
          exists:
            code: CAP
            name: Cap
        material_item:
          exists:
            code: CAP0000001A
            name: Capacitor

    replay: true
    deterministic: true


# =====================================================
# 18. V1.3 — suffix 并发语义与失败码（可执行子集 + 契约回声）
# =====================================================
  - id: SUFFIX_RETRY_001
    title: 同组 suffix 唯一（顺序创建；并发下依赖 UNIQUE+重试，见 meta.prd_freeze.suffix_policy）
    type: core

    given:
      db:
        category:
          - code: ZDA
            name: ZDA
        material_group:
          - id: 1
            category_code: ZDA
            serial_no: 1
        material_item:
          - group_id: 1
            suffix: A
          - group_id: 1
            suffix: B

      input:
        group_id: 1
        spec: SUFFIX_RETRY_SPEC_001
        description: d
        brand: TEST_BRAND

    when:
      action: create_material_replacement

    then:
      db:
        material_item:
          exists:
            suffix: C

    replay: true
    deterministic: true


  - id: SUFFIX_RETRY_002
    title: 后缀并发重试耗尽须返回 SUFFIX_ALLOCATION_FAILED（与 CODE_CONFLICT_RETRY 全局编码冲突区分；实现前本用例为契约回声）
    type: contract

    given:
      input:
        value:
          scenario: retry_exhausted
          expected_error: SUFFIX_ALLOCATION_FAILED
          max_attempts: 3

    when:
      action: echo

    then:
      output:
        result:
          scenario: retry_exhausted
          expected_error: SUFFIX_ALLOCATION_FAILED
          max_attempts: 3

    replay: true
    deterministic: true


# =====================================================
# 19. V1.3 — 替代料基准校验（实现 CreateReplacementByCode 后须与之一致）
# =====================================================
  - id: REPLACEMENT_ANCHOR_001
    title: 基准物料 status=0 时禁止创建替代料（预期 ANCHOR_ITEM_DEPRECATED）
    type: contract_core

